name: Browser load test (configurable users)

on:
  workflow_dispatch:
    inputs:
      num_users:
        description: 'Total number of student bots (1–1000)'
        required: true
        default: '20'
      tabs_per_batch:
        description: 'Chrome tabs per job — keep at 10 for stability (max 15)'
        default: '10'
      hold_minutes:
        description: |
          How long each bot stays in the room.
          For 100 users: 10 min. For 500: 20 min. For 1000: 30 min.
          Must be long enough for all waves to overlap in the room.
        default: '10'
      client_host:
        description: 'Client app URL  e.g. https://home.braincloudlearning.com'
        required: true
      moodle_base:
        description: 'Moodle URL  e.g. https://admin.braincloudlearning.com'
        required: true
      room_id:
        description: 'Test room ID (NOT a real class)'
        required: true

jobs:
  # ── Step 1: calculate how many jobs we need ───────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      num_jobs: ${{ steps.build-matrix.outputs.num_jobs }}
    steps:
      - name: Build job matrix
        id: build-matrix
        run: |
          NUM_USERS=${{ inputs.num_users }}
          TABS=${{ inputs.tabs_per_batch }}
          NUM_JOBS=$(( (NUM_USERS + TABS - 1) / TABS ))

          # GitHub matrix limit is 256 jobs
          if [ $NUM_JOBS -gt 256 ]; then NUM_JOBS=256; fi

          MATRIX=$(node -e "
            const n = $NUM_JOBS;
            console.log(JSON.stringify({ batch: Array.from({length: n}, (_, i) => i) }));
          ")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "num_jobs=$NUM_JOBS" >> $GITHUB_OUTPUT
          echo "Calculated: $NUM_USERS users ÷ $TABS tabs = $NUM_JOBS jobs"

  # ── Step 2: run all the browser batches ──────────────────────────────────
  student-bots:
    needs: setup
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
      # No max-parallel set — GitHub runs as many as your account allows
      # (free accounts: ~20 concurrent; higher plans: more)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: browser-load-test
        run: npm install

      - name: Install Chromium
        working-directory: browser-load-test
        run: npx playwright install chromium --with-deps

      - name: Run student bots — batch ${{ matrix.batch }}
        working-directory: browser-load-test
        env:
          CLIENT_HOST:           ${{ inputs.client_host }}
          MOODLE_BASE:           ${{ inputs.moodle_base }}
          ROOM_ID:               ${{ inputs.room_id }}
          NUM_USERS:             ${{ inputs.num_users }}
          HOLD_MINUTES:          ${{ inputs.hold_minutes }}
          TABS_PER_BATCH:        ${{ inputs.tabs_per_batch }}
          BATCH:                 ${{ matrix.batch }}
          LOAD_TEST_CREDENTIALS: ${{ secrets.LOAD_TEST_CREDENTIALS }}
        run: node run-batch.js
