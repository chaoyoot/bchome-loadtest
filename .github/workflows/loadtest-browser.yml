name: Browser load test (configurable users)

on:
  workflow_dispatch:
    inputs:
      num_users:
        description: 'Number of student bots (1–1000)'
        required: true
        default: '20'
      tabs_per_batch:
        description: 'Chrome tabs per job — keep at 10'
        default: '10'
      hold_minutes:
        description: 'Minutes bots stay in room (100 users→10, 500→20, 1000→30)'
        default: '10'
      client_host:
        description: 'Client URL'
        required: true
        default: 'https://home-th-staging.braincloudlearning.com'
      moodle_base:
        description: 'Moodle URL'
        required: true
        default: 'https://admin.braincloudlearning.com'
      room_id:
        description: 'Test room ID (NOT a real class)'
        required: true
        default: 'c2c_trn_g1.1_chaoyootk_engl'
      session_time:
        description: 'Session time as epoch ms. Leave blank to use today at 17:00 UTC+7 automatically.'
        default: ''
      enable_youtube:
        description: 'Enable YouTube playback in bots (tests YouTube load in classroom)'
        type: boolean
        default: false
      audio_mode:
        description: |
          beep       — Chrome sine wave (default, no setup)
          quiet      — all bots: very faint noise, mic open but nearly silent
          whisper    — all bots: soft voice, short sentences, long pauses
          talking    — all bots: clear voice, medium sentences, moderate pauses
          noisy      — all bots: loud voice, long sentences, short pauses + crowd noise
          mix        — each bot assigned a level by noise_distribution below
        type: choice
        options:
          - beep
          - quiet
          - whisper
          - talking
          - noisy
          - mix
        default: beep
      noise_distribution:
        description: 'mix mode only — ratio of bots at quiet,whisper,talking,noisy (e.g. 4,3,2,1 = 40/30/20/10%). Values cycle, so sum should divide evenly into num_users (sum of 10 works for any multiple of 10 users).'
        default: '4,3,2,1'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Build job matrix
        id: build-matrix
        run: |
          NUM_USERS=${{ inputs.num_users }}
          TABS=${{ inputs.tabs_per_batch }}
          NUM_JOBS=$(( (NUM_USERS + TABS - 1) / TABS ))
          if [ $NUM_JOBS -gt 256 ]; then NUM_JOBS=256; fi
          MATRIX=$(node -e "
            const n = $NUM_JOBS;
            console.log(JSON.stringify({ batch: Array.from({length: n}, (_, i) => i) }));
          ")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Need $NUM_JOBS jobs for $NUM_USERS users"

  student-bots:
    needs: setup
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Pre-built image with Node.js, Chromium + all system deps, espeak-ng, ffmpeg, xvfb.
    # Built once by build-image.yml; pulled from cache on every run — no apt-get needed.
    container:
      image: ghcr.io/${{ github.repository_owner }}/bchome-loadtest:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --shm-size=2g
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: browser-load-test/node_modules
          key: npm-${{ hashFiles('browser-load-test/package.json') }}

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        working-directory: browser-load-test
        # Chromium is already in the Docker image at /ms-playwright — skip re-download.
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Generate per-student audio files
        if: ${{ inputs.audio_mode != 'beep' }}
        working-directory: browser-load-test
        env:
          BATCH:               ${{ matrix.batch }}
          TABS_PER_BATCH:      ${{ inputs.tabs_per_batch }}
          NUM_USERS:           ${{ inputs.num_users }}
          AUDIO_MODE:          ${{ inputs.audio_mode }}
          NOISE_DISTRIBUTION:  ${{ inputs.noise_distribution }}
        run: node generate-audio.js

      - name: Run bots — batch ${{ matrix.batch }}
        working-directory: browser-load-test
        env:
          CLIENT_HOST:           ${{ inputs.client_host }}
          MOODLE_BASE:           ${{ inputs.moodle_base }}
          ROOM_ID:               ${{ inputs.room_id }}
          NUM_USERS:             ${{ inputs.num_users }}
          HOLD_MINUTES:          ${{ inputs.hold_minutes }}
          TABS_PER_BATCH:        ${{ inputs.tabs_per_batch }}
          BATCH:                 ${{ matrix.batch }}
          SESSION_TIME:          ${{ inputs.session_time }}
          ENABLE_YOUTUBE:        ${{ inputs.enable_youtube }}
          AUDIO_MODE:            ${{ inputs.audio_mode }}
          NOISE_DISTRIBUTION:    ${{ inputs.noise_distribution }}
          LOAD_TEST_CREDENTIALS: ${{ secrets.LOAD_TEST_CREDENTIALS }}
        # xvfb-run provides a virtual X display so Chrome runs in non-headless
        # mode. This makes the video compositor fully active, which causes the
        # canplay event to fire for remote WebRTC streams — without it, remote
        # video never passes PeerView's videoCanPlay gate and shows as avatars.
        run: xvfb-run -a -s "-screen 0 1280x720x24" node run-batch.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-batch-${{ matrix.batch }}
          path: browser-load-test/screenshots/
          if-no-files-found: ignore
