name: Build bot Docker image

# Rebuild the image whenever the Dockerfile changes, or trigger manually.
# The image is stored at ghcr.io/<owner>/bchome-loadtest:latest and is
# pulled by every student-bots job in loadtest-browser.yml.
on:
  push:
    branches: [main]
    paths:
      - 'browser-load-test/Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: browser-load-test
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bchome-loadtest:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
